// clang-format off

syntax = "proto3";

package collectortest;

option (tableau.workbook) = {name: "Collector#*.csv"};

import "tableau/protobuf/tableau.proto";

// CollectorItemConf is a simple map sheet for testing error collection.
// Each row has a uint32 ID and an int32 Num field.
message CollectorItemConf {
  option (tableau.worksheet) = {name:"ItemConf" namerow:1 typerow:2 noterow:3 datarow:4};

  map<uint32, Item> item_map = 1 [(tableau.field) = {key:"ID" layout:LAYOUT_VERTICAL}];
  message Item {
    uint32 id = 1 [(tableau.field) = {name:"ID"}];
    int32 num = 2 [(tableau.field) = {name:"Num"}];
    int32 price = 3 [(tableau.field) = {name:"Price"}];
  }
}

// CollectorShopConf is a simple map sheet for testing error collection
// across multiple sheets in the same workbook.
message CollectorShopConf {
  option (tableau.worksheet) = {name:"ShopConf" namerow:1 typerow:2 noterow:3 datarow:4};

  map<uint32, Shop> shop_map = 1 [(tableau.field) = {key:"ShopID" layout:LAYOUT_VERTICAL}];
  message Shop {
    uint32 shop_id = 1 [(tableau.field) = {name:"ShopID"}];
    int32 price = 2 [(tableau.field) = {name:"Price"}];
  }
}
