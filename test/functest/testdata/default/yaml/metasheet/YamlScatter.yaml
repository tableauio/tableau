# define metasheet: generate all sheets
"@sheet": "@TABLEAU"
"YamlScatterConf":
  Scatter: "YamlScatter*.yaml"
---
# define schema
"@sheet": "@YamlScatterConf"
StrictStruct:  # strict struct
  "@type": "{Fruit}"
  "@struct":
    ID: uint32 # fruit id
    Name: string # fruit name
---
"@sheet": YamlScatterConf
StrictStruct:
    ID: 100
    Name: apple
