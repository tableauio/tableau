# define metasheet: generate all sheets
"@sheet": "@TABLEAU"
---
# define schema
"@sheet": "@YamlListConf"
ScalarList: "[int32]" # scalar list
EnumList: "[enum<.FruitType>]" # enum list
IncellScalarList:  # incell scalar list
  "@type": "[int32]"
  "@incell": true
IncellEnumList: "[]enum<.FruitType>" # incell enum list
IncellPredefinedStructList:  # incell predefined struct list
  "@type": "[.Item]"
  "@incell": true
StructList:  # struct list
  "@type": "[Hero]"
  "@struct":
    ID: uint32 # hero id
    Name: string # hero name
PredefinedStructList: "[.Item]" # predefined struct list
ListInList:  # list in list
  "@type": "[Country1]"
  "@struct":
    Country: string # country name
    Desc: string # country description
    Items:  # items in country
      "@type": "[Item]"
      "@struct":
        Name: string # item name
        Num: int32 # item num
MapInList:  # map in list
  "@type": "[Country2]"
  "@struct":
    Country: string # country name
    Desc: string # country description
    Items:  # items map in country
      "@type": "map<uint32, Item>"
      "@struct":
        Name: string # item name
        Num: int32 # item num
Items:  # top-level items list
  "@type": "[Item]"
  "@struct":
    ID: uint32|{unique:true} # item unique id
    Name: string|{unique:true} # item name
    Num: int32 # item num
---
"@sheet": YamlListConf
ScalarList: [1, 2, 3]
EnumList: [FRUIT_TYPE_APPLE, FRUIT_TYPE_ORANGE, FRUIT_TYPE_BANANA]
IncellScalarList: "1, 2, 3"
IncellEnumList: "FRUIT_TYPE_APPLE, FRUIT_TYPE_ORANGE, FRUIT_TYPE_BANANA"
IncellPredefinedStructList: "1001:10,1002:20,1003:30"
StructList:
  - ID: 1
    Name: dog
  - ID: 2
    Name: bird
PredefinedStructList:
  - ID: 1
    Num: 10
  - ID: 2
    Num: 20
ListInList:
  - Country: USA
    Desc: A country in North America.
    Items:
      - Name: apple
        Num: 10
      - Name: orange
        Num: 20
  - Country: China
    Desc: A country in East Asia.
    Items:
      - Name: apple
        Num: 100
      - Name: orange
        Num: 200
MapInList:
  - Country: USA
    Desc: A country in North America.
    Items:
      1:
        Name: apple
        Num: 10
      2:
        Name: orange
        Num: 20
  - Country: China
    Desc: A country in East Asia.
    Items:
      1:
        Name: apple
        Num: 100
      2:
        Name: orange
        Num: 200
Items:
  - ID: 1001
    Name: Apple
    Num: 10
  - ID: 1002
    Name: Banana
    Num: 10
  - ID: 1003
    Name: Orange
    Num: 20
