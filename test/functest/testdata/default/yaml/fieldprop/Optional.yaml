# define metasheet: generate all sheets
"@sheet": "@TABLEAU"
---
# define schema
"@sheet": "@YamlFieldPropOptionalConf"
ID: uint32 # unique id
Num: "int32|{optional:true}" # optional num
Type: "enum<.FruitType>|{optional:true}" # optional type enum
OptionalStruct:  # optional struct
  "@type": "{Struct}|{optional:true}"
  Type: string # struct type
  Price: int32 # struct price
StructMap:  # struct map
  "@type": "map<uint32, Item>"
  "@struct":
    Name: string # item name
    Num: "int32|{optional:true}" # optional item num
OptionalStructMap:  # optional struct map
  "@type": "map<uint32, Item2>|{optional:true}"
  "@struct":
    Name: string # item name
    Num: "int32" # item num
StructList:  # struct list
  "@type": "[Fruit]"
  "@struct":
    Name: string # fruit name
    Num: "int32|{optional:true}" # optional fruit num
OptionalStructList: "[Fruit]|{optional:true}" # optional struct list
---
"@sheet": YamlFieldPropOptionalConf
ID: 1
# Num: 10 # optional field
# Type: FRUIT_TYPE_APPLE # optional field
# OptionalStruct:
#   Type: dollar
#   Price: 100
StructMap:
  1:
    Name: apple
    Num: 10
  2:
    Name: orange
    Num: 20
  3:
    Name: banana
    # Num: 10 # optional field
# OptionalStructMap:
#   1:
#     Name: apple
#     Num: 10
#   2:
#     Name: orange
#     Num: 20
StructList:
  - Name: apple
    Num: 10
  - Name: orange
    Num: 20
  - Name: banana
    # Num: 10 # optional field
# OptionalStructList:
#   - Name: apple
#     Num: 10
#   - Name: orange
#     Num: 20
