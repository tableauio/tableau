# define metasheet: generate all sheets
"@sheet": "@TABLEAU"
"YamlPatchConf":
  Patch: PATCH_MERGE
  Optional: true
  FieldPresence: true
  Scatter: "../overlays/*/Env.yaml"
  ScatterWithoutBookName: true
  WithParentDir: true
---
# define schema
"@sheet": "@YamlPatchConf"
Env: "string" # environment name
StrictStruct:  # strict struct
  "@type": "{Fruit}"
  "@struct":
    ID: uint32 # fruit id
    Name: string # fruit name
    Start: datetime # start time
    Expiry: duration # expiry duration
ScalarList: "[int32]|{patch:PATCH_REPLACE}" # scalar list
StructList:  # struct list
  "@type": "[Animal]"
  "@struct":
    ID: uint32 # animal id
    Name: string # animal name
ScalarMap: "map<uint32, string>|{patch:PATCH_REPLACE}" # scalar map
StructMap:  # struct map
  "@type": "map<uint32, Item>"
  "@struct":
    Name: string # item name
    Num: int32 # item num
---
"@sheet": YamlPatchConf
Env: base
StrictStruct:
  ID: 1
  Name: apple
  Start: 2024-10-01 10:10:10
  Expiry: 1h
ScalarList: [1, 2, 3]
StructList:
  - ID: 1
    Name: dog
  - ID: 2
    Name: bird
ScalarMap:
  1: dog
  2: bird
  3: cat
StructMap:
  1:
    Name: apple
    Num: 10
  2:
    Name: orange
    Num: 20
  3:
    Name: banana
    Num: 30
