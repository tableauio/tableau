# define metasheet: generate all sheets
"@sheet": "@TABLEAU"
---
# define schema
"@sheet": "@YamlMapConf"
ScalarMap: "map<uint32, string>" # scalar kv map
EnumKeyScalarMap: "map<enum<.FruitType>, string>" # enum key scalar map
EnumValueScalarMap: "map<string, enum<.FruitType>>" # enum value scalar map
EnumKVScalarMap:  # enum kv scalar map
  "@type": "map<enum<.FruitType>, enum<.FruitFlavor>>"
  "@struct": CustomMapValue
IncellMap:  # incell map
  "@type": "map<uint32, string>"
  "@incell": true
IncellEnumMap:  # incell enum map
  "@type": "map<enum<.FruitType>, enum<.FruitFlavor>>"
  "@struct": CustomMapValue
  "@incell": true
StructMap:  # struct map
  "@type": "map<uint32, Item>"
  "@struct":
    # item name
    Name: string
    Num: int32 # item num
CustomKeyStructMap:  # custom key struct map
  "@type": "map<uint32, CustomItem>"
  "@struct":
    "@key": CustomKey
    # item name
    Name: string
    Num: int32 # item num
EnumKeyStructMap:  # enum key struct map
  "@type": "map<enum<.FruitType>, EnumItem>"
  "@struct":
    Name: string # item name
    Num: int32 # item num
ListInMap:  # list in map
  "@type": "map<string, Country1>"
  "@struct":
    Desc: string # country description
    Items:  # items list in country
      "@type": "[Item]"
      "@struct":
        Name: string # item name
        Num: int32 # item num
MapInMap:  # map in map
  "@type": "map<string, Country2>"
  "@struct":
    Desc: string # country description
    Items:  # items map in country
      "@type": "map<uint32, Item>"
      "@struct":
        Name: string # item name
        Num: int32 # item num
Chapter:  # chapter map
  "@type": "map<string, Chapter>|{unique:true}"
  "@struct":
    Name: string|{unique:true} # chapter name
    Section:  # section map
      "@type": "map<uint32, Section>|{unique:true}"
      "@struct":
        Name: string|{unique:true} # section name
---
"@sheet": YamlMapConf
ScalarMap:
  1: dog
  2: bird
  3: cat
EnumKeyScalarMap:
  FRUIT_TYPE_APPLE: apple
  FRUIT_TYPE_ORANGE: orange
  FRUIT_TYPE_BANANA: banana
EnumValueScalarMap:
  apple: FRUIT_TYPE_APPLE
  orange: FRUIT_TYPE_ORANGE
  banana: FRUIT_TYPE_BANANA
EnumKVScalarMap:
  FRUIT_TYPE_APPLE: FRUIT_FLAVOR_FRAGRANT
  FRUIT_TYPE_ORANGE: FRUIT_FLAVOR_SOUR
  FRUIT_TYPE_BANANA: FRUIT_FLAVOR_SWEET
IncellMap: "1:dog,2:bird,3:cat"
IncellEnumMap: "FRUIT_TYPE_APPLE:FRUIT_FLAVOR_FRAGRANT, FRUIT_TYPE_ORANGE:FRUIT_FLAVOR_SOUR"
StructMap:
  1:
    Name: apple
    Num: 10
  2:
    Name: orange
    Num: 20
  3:
    Name: banana
    Num: 30
CustomKeyStructMap:
  1:
    Name: apple
    Num: 10
  2:
    Name: orange
    Num: 20
  3:
    Name: banana
    Num: 30
EnumKeyStructMap:
  FRUIT_TYPE_APPLE:
    Name: apple
    Num: 10
  FRUIT_TYPE_ORANGE:
    Name: orange
    Num: 20
  FRUIT_TYPE_BANANA:
    Name: banana
    Num: 30
ListInMap:
