# define metasheet: generate all sheets
"@sheet": "@TABLEAU"
---
# define schema
"@sheet": "@YamlScalarConf"
ID: uint32 # primary key
Num: int32 # player level number
Value: uint64 # player asset value in cents
Weight: int64 # player weight
Percentage: float # percentage value
Ratio: double # ratio value
Name: string # player display name used in UI and logs
Blob: bytes # binary blob data
OK: bool # whether player is ok

---
"@sheet": YamlScalarConf
ID: 1
Num: 10
Value: 20
Weight: 30
Percentage: 0.5
Ratio: 3.14159
Name: apple
Blob: "VGFibGVhdQ==" # base64 of "Tableau"
OK: true
